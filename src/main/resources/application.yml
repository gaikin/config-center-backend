server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  application:
    name: config-center-backend
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  type-aliases-package: com.configcenter.backend
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.configcenter.backend: INFO
